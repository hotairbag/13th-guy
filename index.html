<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/icon.svg" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#00000a" />
        <title>13TH GUY</title>
    </head>
    <body>
        <canvas aria-label="13th Guy game" />
        <div id="touch-controls" aria-label="Touch controls">
            <div
                id="joystick"
                role="application"
                aria-label="Movement joystick. Drag in any direction to move."
            >
                <div id="joystick-knob"></div>
            </div>
            <button
                id="action-button"
                type="button"
                aria-label="Start or continue"
            >
                GO
            </button>
        </div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
